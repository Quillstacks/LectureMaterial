name: Validate LaTeX

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build lecture PDFs
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Compile all lecture notes
        uses: xu-cheng/latex-action@v3
        continue-on-error: true
        id: compile
        with:
          root_file: |
            lecturenotes/notes_unsupervisedlearning/notes_unsupervisedlearning.tex
            lecturenotes/notes_missingsemester/notes_missingsemester.tex
            lecturenotes/notes_numerischemethoden/notes_numerischemethoden.tex
            lecturenotes/notes_philosophyofai/notes_philosophyofai.tex
          work_in_root_file_dir: true
          args: -pdf -interaction=nonstopmode -f

      - name: Verify all PDFs were produced
        run: |
          set -e
          for pdf in \
            lecturenotes/notes_unsupervisedlearning/notes_unsupervisedlearning.pdf \
            lecturenotes/notes_missingsemester/notes_missingsemester.pdf \
            lecturenotes/notes_numerischemethoden/notes_numerischemethoden.pdf \
            lecturenotes/notes_philosophyofai/notes_philosophyofai.pdf; do
            if [ ! -s "$pdf" ]; then
              echo "::error::PDF missing or empty: $pdf"
              exit 1
            fi
            echo "OK: $pdf ($(stat -c %s "$pdf") bytes)"
          done
